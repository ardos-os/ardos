name: Build Ardos OS Artifacts

on:
  push:
  workflow_dispatch:

env:
  BUILD_DIR: build
  ARDOS_PACKER_DIR: packages/ardos-packer
  CARGO_TERM_COLOR: always

jobs:
  build-ardos-packer:
    name: Build ardos-packer
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      # Cache p/ runs futuras
      - name: Restore cache (ardos-packer + build)
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.BUILD_DIR }}
            ~/.cargo/registry
            ~/.cargo/git
            packages/ardos-packer/target
          key: build-ardos-packer-${{ runner.os }}-${{ hashFiles('packages/ardos-packer/**') }}
          restore-keys: |
            build-ardos-packer-${{ runner.os }}-
      - name: Build ardos-packer
        working-directory: ${{ env.ARDOS_PACKER_DIR }}
        run: cargo build --release

      - name: Place binary in build/
        run: |
          mkdir -p $BUILD_DIR
          cp $ARDOS_PACKER_DIR/target/release/ardos-packer $BUILD_DIR/ardos-packer
          chmod +x $BUILD_DIR/ardos-packer

      # Artifact único deste job
      - name: Upload build dir (ardos-packer)
        uses: actions/upload-artifact@v4
        with:
          name: build-dir-ardos-packer
          path: build/

  build-kernel:
    name: Build Kernel
    runs-on: blacksmith-16vcpu-ubuntu-2404
    needs: [build-ardos-packer]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      # Cache para runs futuras (parte do kernel)
      - name: Restore cache (kernel)
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILD_DIR }}
          key: build-kernel-${{ runner.os }}-${{ hashFiles('build/kernel/out/kernel') }}
          restore-keys: |
            build-kernel-${{ runner.os }}-

      # Recebe o build/ do job anterior
      - name: Download build dir (ardos-packer)
        uses: actions/download-artifact@v4
        with:
          name: build-dir-ardos-packer
          path: build

      - name: Build kernel
        run: chmod +x ./build/ardos-packer && rm build/kernel/out/kernel.hash -f &&  ./build/ardos-packer kernel build

      - name: Delete ardos-packer
        run: rm build/ardos-packer -f
        if: always()

      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: build/kernel/out/kernel

      - name: Fix permissions for upload
        run: |
          sudo chmod -R a+r build/kernel || true
          sudo chown -R $(whoami):$(whoami) build/kernel || true

      - name: Upload build dir (kernel)
        uses: actions/upload-artifact@v4
        with:
          name: build-dir-kernel
          path: build/

  build-initrd:
    name: Build Initrd
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [build-ardos-packer]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Restore cache (initrd)
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILD_DIR }}
          key: build-initrd-${{ runner.os }}-${{ hashFiles('**/packages/init-stage-1/**') }}
          restore-keys: |
            build-initrd-${{ runner.os }}-

      - name: Download build dir (ardos-packer)
        uses: actions/download-artifact@v4
        with:
          name: build-dir-ardos-packer
          path: build

      - name: Build initrd
        run: chmod +x ./build/ardos-packer && ./build/ardos-packer initrd build

      - name: Delete ardos-packer
        run: rm build/ardos-packer -f
        if: always()

      - name: Upload initrd
        uses: actions/upload-artifact@v4
        with:
          name: initrd
          path: build/initrd/initrd.img

      - name: Upload build dir (initrd)
        uses: actions/upload-artifact@v4
        with:
          name: build-dir-initrd
          path: build/
  build-image:
    name: Build System Image
    runs-on: blacksmith-32vcpu-ubuntu-2404
    needs: [build-ardos-packer]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - run: sudo chmod 777 . -R

      - name: Download build dir (ardos-packer)
        uses: actions/download-artifact@v4
        with:
          name: build-dir-ardos-packer
          path: build-ardos
      - name: Restore cache (image)
        uses: actions/cache/restore@v4
        if: always()
        with:
          path: ${{ env.BUILD_DIR }}
          restore-keys: |
            build-image-${{ runner.os }}-
          key: build-image-${{ runner.os }}-${{ hashFiles('**/manifest.toml', '**/sysroot/**') }}
      

      - name: Delete old images
        run: rm -rf build/images

      - name: Build system image
        run: |
          chmod +x ./build-ardos/ardos-packer
          ./build-ardos/ardos-packer image assemble || true   # continua mesmo se falhar

      - name: Delete ardos-packer
        run: rm -f build/ardos-packer
        if: always()

      - name: Upload system image
        uses: actions/upload-artifact@v4
        with:
          name: system-image
          path: build/images/*.squashfs

      - name: Fix build dir permissions
        run: sudo chown $(whoami):$(whoami) build/ -R
        if: always()

      - name: Upload build dir (image)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-dir-image
          path: build/

      - name: Save cache (image)
        if: always()
        uses: actions/cache/save@v4
        with:
          key: build-image-${{ runner.os }}-${{ hashFiles('**/manifest.toml', '**/sysroot/**') }}
          path: ${{ env.BUILD_DIR }}

  merge-build-dir:
    name: Merge build/ from all jobs + save cache
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: [build-kernel, build-initrd, build-image]
    steps:
      - uses: actions/checkout@v4

      # Descarregar os três artifacts de build/ (nomes distintos)
      - name: Download build dir (kernel)
        uses: actions/download-artifact@v4
        with:
          name: build-dir-kernel
          path: build-kernel
      - name: Download build dir (initrd)
        uses: actions/download-artifact@v4
        with:
          name: build-dir-initrd
          path: build-initrd
      - name: Download build dir (image)
        uses: actions/download-artifact@v4
        with:
          name: build-dir-image
          path: build-image

      # Mesclar para ./build (preserva subpastas distintas; último wins em conflitos)
      - name: Merge build dirs
        run: |
          mkdir -p build
          rsync -a build-kernel/ build/
          rsync -a build-initrd/ build/
          rsync -a build-image/ build/

      # Artifact do build/ final (debug/consumo posterior)
      - name: Upload merged build dir
        uses: actions/upload-artifact@v4
        with:
          name: build-dir-merged
          path: build/
